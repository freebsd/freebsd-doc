[zfs-title]
other = "原生 ZFS"

[zfs-description]
other = "將檔案系統與磁碟區管理整合為單一可靠的儲存平台。在 FreeBSD 中，它已完整整合至作業系統。"

[virtualization-title]
other = "虛擬化"

[virtualization-description]
other = "是 FreeBSD 的現代化虛擬機管理程式，支援 virtio、PCI passthrough 與高速 NVMe 模擬。"

[jails-title]
other = "Jails"

[jails-description]
other = "FreeBSD jails 為服務與應用程式提供隔離環境。每個 jail 都能擁有自己的檔案系統、網路與設定。"

[networking-title]
other = "網路"

[networking-description]
other = "FreeBSD 以優異的網路效能與穩定性聞名，支撐全球高負載基礎設施。"

[documentation-title]
other = "文件"

[documentation-description]
other = "FreeBSD 提供完整且維護良好的文件。從 Handbook 到手冊頁，文件被視為系統核心的一部分。"

[community-title]
other = "社群"

[community-description]
other = "FreeBSD 擁有一個充滿活力且協作性強的社群，從個人貢獻者到大型企業組織皆然。各種團體活躍於不同管道，從即時通訊到郵件列表及新聞群組。"

