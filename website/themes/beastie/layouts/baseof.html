<!DOCTYPE html>
<html lang="{{ $.Site.Language.Locale | default "en" }}">
  {{ partial "site-head.html" . }}
  <body>
    <input type="checkbox" class="theme-switch" id="theme-switch">
    <div id="page">
      {{ block "header" . }}{{ partial "site-header.html" .}}{{ end }}
      <main>
        {{ block "main" . }}{{ end }}
      </main>
      {{ block "footer" . }}{{ partial "site-footer.html" .}}{{ end }}
    </div>
  </body>
</html>
